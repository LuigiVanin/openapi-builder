root = "."
tmp_dir = "tmp"

[build]
  # Compile the test binary instead of the app
  cmd = "go test -c -o ./tmp/tests.test ./tests"
  bin = "./tmp/tests.test"
  # Flags passed to the test binary (note the `test.` prefix on compiled binaries)
  args_bin = ["-test.v"]
  delay = 1000
  exclude_dir = ["tmp", "vendor", "testdata", "specs", "cmd"]
  include_ext = ["go"]
  exclude_regex = []
  log = "build-errors.log"
  stop_on_error = true

[screen]
  clear_on_rebuild = true
  keep_scroll = false
